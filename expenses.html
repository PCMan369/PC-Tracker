<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RigFlip - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="expenses">
  <header>
    <div class="logo">
      <h1>🖥️ RigFlip Tracker</h1>
    </div>
    <nav>
      <a href="index.html">Inventory</a>
      <a href="expenses.html">Expenses</a>
      <a href="pcs.html">Built PCs</a>
      <a href="sales.html">Sales History</a>
    </nav>
  </header>

  <div class="container">
    <h2>Expense Tracking</h2>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Extra Expenses</h3>
        <div class="val" id="total-expenses">$0.00</div>
      </div>
    </div>

    <div class="card">
      <h3 class="card-title">Record General Expense</h3>
      <form id="expense-form">
        <div class="form-group">
          <label>Description</label>
          <input type="text" id="exp-desc" placeholder="e.g., Thermal Paste, Zip Ties, Shipping Box" required>
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="exp-cat">
            <option value="Supplies & Tools">Supplies & Tools</option>
            <option value="Shipping">Shipping</option>
            <option value="Software/OS">Software/OS</option>
            <option value="Gas/Travel">Gas/Travel</option>
            <option value="Misc">Misc</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" step="0.01" id="exp-amount" placeholder="15.50" required>
        </div>
        <button type="submit">Log Expense</button>
      </form>
    </div>

    <div class="card">
      <h3 class="card-title">Expense History</h3>
      <table>
        <thead>
          <tr>
            <th>Description</th>
            <th>Category</th>
            <th>Amount</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expense-tbody"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
