<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RigFlip - Parts Inventory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="inventory">
  <header>
    <div class="logo">
      <h1>🖥️ RigFlip Tracker</h1>
    </div>
    <nav>
      <a href="index.html">Inventory</a>
      <a href="expenses.html">Money Tracker</a>
      <a href="pcs.html">Built PCs</a>
      <a href="sales.html">Sales History</a>
    </nav>
  </header>

  <div class="container">
    <h2>Parts Inventory</h2>

    <div class="card">
      <h3 class="card-title">Add Component to Stock</h3>
      <form id="inventory-form">
        <div class="form-group">
          <label>Part Name</label>
          <input type="text" id="part-name" placeholder="e.g., Ryzen 5 5600X" required>
        </div>
        <div class="form-group">
          <label>Category / Type</label>
          <select id="part-category">
            <option value="CPU">CPU</option>
            <option value="GPU">GPU</option>
            <option value="RAM">RAM</option>
            <option value="Storage">Storage</option>
            <option value="Motherboard">Motherboard</option>
            <option value="PSU">PSU</option>
            <option value="Case">Case</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Purchase Cost ($)</label>
          <input type="number" step="0.01" id="part-cost" placeholder="120.00" required>
        </div>
        <button type="submit">Add Component & Log Cash Outflow</button>
      </form>
    </div>

    <div class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h3 class="card-title" style="margin: 0;">In-Stock Inventory</h3>
        <span style="font-size: 0.85rem; color: var(--text-muted);">Sorted by Category $\rightarrow$ Cost</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Part Name</th>
            <th>Cost</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-tbody"></tbody>
      </table>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
